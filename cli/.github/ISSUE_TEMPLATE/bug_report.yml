name: Bug Report
description: Report a bug you confirmed and could not fix.
labels: ["bug", "status: triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `nemoclaw onboard`
        2. Select "local" inference
        3. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, Docker version, NemoClaw version, and any other relevant details.
      placeholder: |
        - OS: macOS 15.2 / Ubuntu 24.04 / Windows 11 + WSL2
        - Node.js: v20.x
        - Docker: Docker Desktop 4.x / Docker Engine 27.x
        - NemoClaw: v0.x.x (output of `nemoclaw --version`)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output, error messages, or stack traces.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I confirmed this bug is reproducible
          required: true
        - label: I searched existing issues and this is not a duplicate
          required: true
