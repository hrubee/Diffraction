preset:
  name: linkedin
  description: "LinkedIn API and OAuth access"

network_policies:
  linkedin:
    name: linkedin
    endpoints:
      - host: api.linkedin.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: www.linkedin.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/oauth/**" }
          - allow: { method: POST, path: "/oauth/**" }
