# Chatbot agent blueprint — multi-channel conversational AI
name: chatbot
description: "Conversational AI agent with messaging integrations"

inference:
  model: "nvidia/nemotron-3-super-120b-a12b"

policy:
  presets:
    - telegram
    - slack
    - discord

extensions:
  - telegram
  - slack
  - discord

skills: []

env:
  TELEGRAM_BOT_TOKEN_ENV: TELEGRAM_BOT_TOKEN
  SLACK_BOT_TOKEN_ENV: SLACK_BOT_TOKEN
  DISCORD_BOT_TOKEN_ENV: DISCORD_BOT_TOKEN
