name: Diffraction
options:
  bundleIdPrefix: ai.diffraction
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  DiffractionKit:
    path: ../shared/DiffractionKit
  Swabble:
    path: ../../Swabble

schemes:
  Diffraction:
    shared: true
    build:
      targets:
        Diffraction: all
    test:
      targets:
        - DiffractionTests
        - DiffractionLogicTests
  DiffractionLogicTests:
    shared: true
    build:
      targets:
        DiffractionLogicTests: all
    test:
      targets:
        - DiffractionLogicTests

targets:
  Diffraction:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: DiffractionShareExtension
        embed: true
      - target: DiffractionActivityWidget
        embed: true
      - target: DiffractionWatchApp
      - package: DiffractionKit
      - package: DiffractionKit
        product: DiffractionChatUI
      - package: DiffractionKit
        product: DiffractionProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/Diffraction.entitlements
        CODE_SIGN_STYLE: "$(DIFFRACTION_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(DIFFRACTION_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(DIFFRACTION_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(DIFFRACTION_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          DIFFRACTION_PUSH_TRANSPORT: direct
          DIFFRACTION_PUSH_DISTRIBUTION: local
          DIFFRACTION_PUSH_RELAY_BASE_URL: ""
          DIFFRACTION_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          DIFFRACTION_PUSH_TRANSPORT: direct
          DIFFRACTION_PUSH_DISTRIBUTION: local
          DIFFRACTION_PUSH_RELAY_BASE_URL: ""
          DIFFRACTION_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Diffraction
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.diffraction.ios
            CFBundleURLSchemes:
              - diffraction
        CFBundleShortVersionString: "$(DIFFRACTION_MARKETING_VERSION)"
        CFBundleVersion: "$(DIFFRACTION_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.diffraction.ios.bgrefresh
        NSLocalNetworkUsageDescription: Diffraction discovers and connects to your Diffraction gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _diffraction-gw._tcp
        NSCameraUsageDescription: Diffraction can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: Diffraction uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: Diffraction can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: Diffraction needs microphone access for voice wake.
        NSMotionUsageDescription: Diffraction may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: Diffraction needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: Diffraction uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        DiffractionPushTransport: "$(DIFFRACTION_PUSH_TRANSPORT)"
        DiffractionPushDistribution: "$(DIFFRACTION_PUSH_DISTRIBUTION)"
        DiffractionPushRelayBaseURL: "$(DIFFRACTION_PUSH_RELAY_BASE_URL)"
        DiffractionPushAPNsEnvironment: "$(DIFFRACTION_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  DiffractionShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: DiffractionKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(DIFFRACTION_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(DIFFRACTION_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(DIFFRACTION_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(DIFFRACTION_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Diffraction Share
        CFBundleShortVersionString: "$(DIFFRACTION_MARKETING_VERSION)"
        CFBundleVersion: "$(DIFFRACTION_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  DiffractionActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/DiffractionActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(DIFFRACTION_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(DIFFRACTION_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(DIFFRACTION_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: Diffraction Activity
        CFBundleShortVersionString: "$(DIFFRACTION_MARKETING_VERSION)"
        CFBundleVersion: "$(DIFFRACTION_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  DiffractionWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: DiffractionWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(DIFFRACTION_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Diffraction
        CFBundleShortVersionString: "$(DIFFRACTION_MARKETING_VERSION)"
        CFBundleVersion: "$(DIFFRACTION_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(DIFFRACTION_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  DiffractionWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(DIFFRACTION_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: Diffraction
        CFBundleShortVersionString: "$(DIFFRACTION_MARKETING_VERSION)"
        CFBundleVersion: "$(DIFFRACTION_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(DIFFRACTION_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  DiffractionTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: Diffraction
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(DIFFRACTION_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(DIFFRACTION_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.diffraction.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Diffraction.app/Diffraction"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: DiffractionTests
        CFBundleShortVersionString: "$(DIFFRACTION_MARKETING_VERSION)"
        CFBundleVersion: "$(DIFFRACTION_BUILD_VERSION)"

  DiffractionLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: DiffractionKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(DIFFRACTION_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(DIFFRACTION_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.diffraction.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: DiffractionLogicTests
        CFBundleShortVersionString: "$(DIFFRACTION_MARKETING_VERSION)"
        CFBundleVersion: "$(DIFFRACTION_BUILD_VERSION)"
